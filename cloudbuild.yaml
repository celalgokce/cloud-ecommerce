# CI/CD Pipeline - GitHub push → Cloud Build → Cloud Run
steps:
  # Step 1: Install dependencies and test
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['test']

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cloud-ecommerce:$SHORT_SHA', '.']

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cloud-ecommerce:$SHORT_SHA']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'cloud-ecommerce'
      - '--image=gcr.io/$PROJECT_ID/cloud-ecommerce:$SHORT_SHA'
      - '--platform=managed'
      - '--region=europe-west1'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=$PROJECT_ID:europe-west1:ecommerce-db'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=256Mi'
      - '--port=8080'

images:
  - 'gcr.io/$PROJECT_ID/cloud-ecommerce:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
